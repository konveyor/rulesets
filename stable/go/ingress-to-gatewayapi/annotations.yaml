- ruleID: annotations-pattern-00130
  description: HSTS annotations replaced by Gateway API ResponseHeaderModifier filter
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=go
    - konveyor.io/target=go
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `nginx.ingress.kubernetes.io/hsts`, `hsts-max-age`, and `hsts-include-subdomains` annotations are not supported in Gateway API. Replace with an `HTTPRouteFilter` of type `ResponseHeaderModifier` that sets the `Strict-Transport-Security` response header.

    ### Before

    ```go
    annotations := map[string]string{
        "nginx.ingress.kubernetes.io/hsts":                    "true",
        "nginx.ingress.kubernetes.io/hsts-max-age":            "31536000",
        "nginx.ingress.kubernetes.io/hsts-include-subdomains": "true",
    }
    ```

    ### After

    ```go
    filter := gatewayv1.HTTPRouteFilter{
        Type: gatewayv1.HTTPRouteFilterResponseHeaderModifier,
        ResponseHeaderModifier: &gatewayv1.HTTPHeaderFilter{
            Set: []gatewayv1.HTTPHeader{
                {Name: "Strict-Transport-Security", Value: "max-age=31536000; includeSubDomains"},
            },
        },
    }
    ```

    ### Additional Info

    - Gateway API uses `ResponseHeaderModifier` to set HSTS headers directly
    - Compose the `Strict-Transport-Security` header value from the individual annotation values (max-age, includeSubDomains, preload)
    - If `hsts-preload` was also set, include `; preload` in the header value
    - ResponseHeaderModifier can set multiple headers in a single filter
    - See: https://gateway-api.sigs.k8s.io/guides/getting-started/migrating-from-ingress/
  links:
    - url: https://gateway-api.sigs.k8s.io/guides/getting-started/migrating-from-ingress/
      title: Migration Documentation
  when:
    or:
        - builtin.filecontent:
            pattern: nginx\.ingress\.kubernetes\.io/hsts["':\s]
            filePattern: .*\.go
        - builtin.filecontent:
            pattern: nginx\.ingress\.kubernetes\.io/hsts-max-age
            filePattern: .*\.go
        - builtin.filecontent:
            pattern: nginx\.ingress\.kubernetes\.io/hsts-include-subdomains
            filePattern: .*\.go
