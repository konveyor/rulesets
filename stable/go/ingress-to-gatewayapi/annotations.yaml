    ```

    ### After

    Use your Gateway implementation's policy CRDs for request body size limits. For example, Envoy Gateway provides `BackendTrafficPolicy` with request body size configuration. Consult your Gateway implementation's documentation.

    ### Additional Info

    - Gateway API does not have a standard request body size limit API
    - Envoy Gateway uses `BackendTrafficPolicy` for request size limits
    - Consider setting body size limits at the application level as an alternative
    - The default body size limit may vary between Gateway implementations
