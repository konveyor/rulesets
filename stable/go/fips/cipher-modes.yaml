      title: Migration Documentation
  when:
    go.referenced:
        pattern: crypto/cipher.NewOFB
- ruleID: cipher-modes-change-00040
  description: CTR mode provides no authentication; replace with AES-GCM for FIPS compliance
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=go
    - konveyor.io/target=go
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    CTR mode (`cipher.NewCTR`) provides confidentiality without authentication. For FIPS 140-3 compliance, prefer authenticated encryption modes like AES-GCM.

    ### Before

    ```go
    import "crypto/cipher"

    stream := cipher.NewCTR(block, iv)
    stream.XORKeyStream(ciphertext, plaintext)
    ```

    ### After

    ```go
    import "crypto/cipher"

    gcm, _ := cipher.NewGCM(block)
    nonce := make([]byte, gcm.NonceSize())
    _, _ = rand.Read(nonce)
    ciphertext := gcm.Seal(nil, nonce, plaintext, nil)
    ```

    ### Additional Info

    - CTR is a streaming mode that does not provide integrity or authenticity guarantees.
    - AES-GCM provides authenticated encryption (confidentiality + integrity) in one operation.
    - Switching from CTR to GCM changes the encryption interface from `XORKeyStream` to `Seal`/`Open`.
    - Ensure nonces are unique per encryption operation when using GCM.
    - AES-GCM internally uses CTR mode but adds authentication via GHASH.
  links:
    - url: https://pkg.go.dev/crypto/cipher#NewGCM
      title: Migration Documentation
  when:
    go.referenced:
        pattern: crypto/cipher.NewCTR
