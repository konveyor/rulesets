- ruleID: build-pattern-00010
  description: Go 1.24+ is required for the native FIPS 140-3 module
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=go
    - konveyor.io/target=go
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The native FIPS 140-3 module requires Go 1.24 or later. Projects using an older Go version must upgrade before enabling FIPS mode.

    ### Migration Steps

    1. Update the `go` directive in `go.mod` to at least `go 1.24`
    2. Run `go mod tidy` to update dependencies
    3. Verify all dependencies are compatible with Go 1.24+
    4. Rebuild and test the project

    ### Before

    ```
    go 1.21
    ```

    ### After

    ```
    go 1.24
    ```

    ### Additional Info

    - Go 1.24 is the minimum for FIPS 140-3 module v1.0.0, GOFIPS140, GODEBUG=fips140=on, ML-KEM, and crypto/fips140
    - Go 1.26+ is required for ML-DSA support
    - The go directive in go.mod controls the language version and available features
    - Consider upgrading to the latest stable Go release for best FIPS support
    - Run `go vet` after upgrading to catch any compatibility issues
  links:
    - url: https://go.dev/doc/fips140
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: ^go\s+1\.(2[0-3]|1[0-9]|[0-9])(\.\d+)?\s*$
        filePattern: go\.mod
- ruleID: build-pattern-00020
  description: GOEXPERIMENT=boringcrypto is the legacy FIPS mechanism; replace with GOFIPS140
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=go
    - konveyor.io/target=go
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `GOEXPERIMENT=boringcrypto` flag is the legacy mechanism for FIPS compliance via BoringSSL. It is being removed in favor of the native FIPS 140-3 module. Replace with `GOFIPS140=latest`.

    ### Before

    ```dockerfile
    ENV GOEXPERIMENT=boringcrypto
    RUN go build -o myapp ./...
    ```

    ### After

    ```dockerfile
    ENV GOFIPS140=latest
    RUN go build -o myapp ./...
    ```

    ### Additional Info

    - `GOEXPERIMENT=boringcrypto` is incompatible with `GOFIPS140` — you must remove it first
    - The native FIPS 140-3 module requires no cgo, unlike BoringCrypto
    - Check Dockerfiles, CI configs, Makefiles, and shell scripts for this setting
    - The native module provides better performance and maintenance compared to the BoringSSL shim
    - Ensure Go 1.24+ before switching to GOFIPS140
  links:
    - url: https://go.dev/doc/fips140
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: GOEXPERIMENT\s*=\s*boringcrypto
        filePattern: .*\.(sh|bat|cmd|conf|ya?ml|env|args|Dockerfile|Makefile|mk)
- ruleID: build-pattern-00030
  description: Microsoft Go's GOFIPS=1 is deprecated; migrate to upstream GOFIPS140
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=go
    - konveyor.io/target=go
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Microsoft's Go fork used `GOFIPS=1` for FIPS compliance. This is deprecated in favor of upstream Go's `GOFIPS140` environment variable.

    ### Before

    ```bash
    GOFIPS=1 go build -tags=requirefips ./...
    ```

    ### After

    ```bash
    GOFIPS140=latest go build ./...
    ```

    ### Additional Info

    - `GOFIPS=1` is specific to the Microsoft Go fork and not recognized by upstream Go
    - Upstream Go 1.24+ provides native FIPS 140-3 support via `GOFIPS140`
    - Also remove `-tags=requirefips` which is Microsoft fork-specific
    - Consider migrating from the Microsoft Go fork to upstream Go for native FIPS support
    - Check all build scripts, CI pipelines, and Dockerfiles for `GOFIPS=1` references
  links:
    - url: https://go.dev/doc/fips140
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: GOFIPS\s*=\s*1
        filePattern: .*\.(sh|bat|cmd|conf|ya?ml|env|args|Dockerfile|Makefile|mk)
- ruleID: build-pattern-00040
  description: Microsoft Go's -tags=requirefips is not recognized by upstream Go; use GOFIPS140
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=go
    - konveyor.io/target=go
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `-tags=requirefips` build tag is specific to the Microsoft Go fork and is not recognized by upstream Go. No custom build tags are needed with the upstream FIPS 140-3 module.

    ### Before

    ```bash
    go build -tags=requirefips ./...
    ```

    ### After

    ```bash
    GOFIPS140=latest go build ./...
    ```

    ### Additional Info

    - `-tags=requirefips` is Microsoft Go fork-specific and has no effect in upstream Go
    - Upstream Go 1.24+ provides native FIPS 140-3 support without custom build tags
    - The `GOFIPS140=latest` environment variable replaces both `GOFIPS=1` and `-tags=requirefips`
    - Check all build commands, Makefiles, CI configs, and Dockerfiles for this tag
    - If still on the Microsoft Go fork, plan migration to upstream Go for native FIPS support
  links:
    - url: https://go.dev/doc/fips140
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: -tags[= ]requirefips
        filePattern: .*\.(sh|bat|cmd|conf|ya?ml|env|args|Dockerfile|Makefile|mk)
