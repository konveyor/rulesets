- ruleID: jwt-pattern-00010
  description: RSA JWT signatures are quantum-vulnerable; inventory for PQC migration
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=go
    - konveyor.io/target=go
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    RSA-PKCS#1 v1.5 JWT signatures (RS256/RS384/RS512) are currently FIPS 140-3 approved but are vulnerable to quantum computers via Shor's algorithm. Inventory all JWT signing infrastructure that uses RSA for post-quantum cryptography (PQC) migration planning.

    ### Detection

    This rule flags usage of `jwt.SigningMethodRS256`, `jwt.SigningMethodRS384`, or `jwt.SigningMethodRS512` signing methods.

    ### Additional Info

    - RSA signatures are approved under FIPS 186-5 but will need replacement when quantum computers become practical
    - Begin cataloging all services that sign or verify JWT tokens with RSA
    - Consider migration timeline to post-quantum signature algorithms when NIST standards are finalized
    - HMAC-based JWT signing (HS256/HS384/HS512) is quantum-resistant and may be suitable for internal service-to-service tokens
    - Coordinate with identity providers on their PQC migration timelines
  links:
    - url: https://csrc.nist.gov/pubs/fips/140-3/final
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: jwt\.SigningMethod(RS256|RS384|RS512)
        filePattern: .*\.go
- ruleID: jwt-pattern-00020
  description: RSA-PSS JWT signatures are quantum-vulnerable; inventory for PQC migration
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=go
    - konveyor.io/target=go
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    RSA-PSS JWT signatures (PS256/PS384/PS512) are currently FIPS 140-3 approved but are vulnerable to quantum computers. While PSS is more secure than PKCS#1 v1.5 against classical attacks, both are equally vulnerable to quantum attacks via Shor's algorithm.

    ### Detection

    This rule flags usage of `jwt.SigningMethodPS256`, `jwt.SigningMethodPS384`, or `jwt.SigningMethodPS512` signing methods.

    ### Additional Info

    - RSA-PSS provides better security margins against classical padding oracle attacks compared to PKCS#1 v1.5
    - Both RSA signature schemes face the same quantum vulnerability — Shor's algorithm
    - Inventory all PSS signing infrastructure for PQC migration planning
    - Consider timeline alignment with RSA PKCS#1 v1.5 migration since both need PQC replacement
    - HMAC-based JWT signing is quantum-resistant for symmetric use cases
  links:
    - url: https://csrc.nist.gov/pubs/fips/140-3/final
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: jwt\.SigningMethod(PS256|PS384|PS512)
        filePattern: .*\.go
- ruleID: jwt-pattern-00030
  description: ECDSA JWT signatures are quantum-vulnerable; inventory for PQC migration
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=go
    - konveyor.io/target=go
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    ECDSA JWT signatures (ES256/ES384/ES512) are currently FIPS 140-3 approved but are vulnerable to quantum computers. ECDSA relies on the elliptic curve discrete logarithm problem, which Shor's algorithm can solve efficiently.

    ### Detection

    This rule flags usage of `jwt.SigningMethodES256`, `jwt.SigningMethodES384`, or `jwt.SigningMethodES512` signing methods.

    ### Additional Info

    - ECDSA is widely used for JWT signing due to smaller key sizes compared to RSA
    - Quantum vulnerability applies to all elliptic curve signature schemes
    - Inventory all ECDSA signing infrastructure for PQC migration planning
    - NIST post-quantum signature standards (ML-DSA/Dilithium) are designed as replacements
    - HMAC-based JWT signing is quantum-resistant for symmetric use cases
  links:
    - url: https://csrc.nist.gov/pubs/fips/140-3/final
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: jwt\.SigningMethod(ES256|ES384|ES512)
        filePattern: .*\.go
