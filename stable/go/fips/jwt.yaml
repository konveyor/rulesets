    - konveyor.io/target=go
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    EdDSA (Ed25519) JWT signatures are FIPS approved under FIPS 186-5 but are vulnerable to quantum computers. EdDSA relies on elliptic curve cryptography, which Shor's algorithm can break.

    ### Detection

    This rule flags usage of `jwt.SigningMethodEdDSA` signing method.

    ### Additional Info

    - Ed25519 is approved in FIPS 186-5 for digital signatures
    - Quantum vulnerability applies to all elliptic curve signature schemes including EdDSA
    - EdDSA offers performance advantages over ECDSA but shares the same quantum risk
    - Inventory all EdDSA signing infrastructure for PQC migration planning
    - HMAC-based JWT signing is quantum-resistant for symmetric use cases
  links:
