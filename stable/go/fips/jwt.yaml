      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: jwt\.SigningMethodEdDSA
        filePattern: .*\.go
- ruleID: jwt-pattern-00050
  description: HMAC JWT signatures are quantum-resistant; verify key sizes meet FIPS requirements
  category: potential
  effort: 1
  labels:
    - konveyor.io/source=go
    - konveyor.io/target=go
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    HMAC JWT signatures (HS256/HS384/HS512) are FIPS 140-3 approved and quantum-resistant with adequate key sizes. No PQC migration is required for symmetric JWT signing.

    ### Detection

    This rule flags usage of `jwt.SigningMethodHS256`, `jwt.SigningMethodHS384`, or `jwt.SigningMethodHS512` signing methods.

    ### Additional Info

    - HMAC-SHA256 with a 256-bit key provides 128-bit quantum security via Grover's algorithm
    - Ensure HMAC keys are at least 256 bits for quantum resistance
    - HMAC is only suitable for scenarios where signing and verification parties share a secret key
    - Not suitable for public verification scenarios (use asymmetric signatures instead)
    - Verify that HMAC key generation uses a FIPS-approved random number generator
  links:
    - url: https://csrc.nist.gov/pubs/fips/140-3/final
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: jwt\.SigningMethod(HS256|HS384|HS512)
        filePattern: .*\.go
