- ruleID: openjdk25--to-openjdk25+-00600
  description: java.awt.peer package not accessible since JDK 9
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `java.awt.peer` package is not accessible starting in JDK 9. It was never part of the Java SE API. Code that references types from this package will no longer compile or run. Use `Component.isDisplayable()` instead of `component.getPeer() != null`, and `Component.isLightweight()` instead of `component.getPeer() instanceof LightweightPeer`.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/migrating-jdk-8-later-jdk-releases.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.awt.peer
        location: PACKAGE
