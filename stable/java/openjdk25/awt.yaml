- ruleID: openjdk25--to-openjdk25+-00620
  description: Component.getPeer() removed in JDK 9
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `Component.getPeer()` method has been removed in JDK 9. Replace usages as follows:

    ```java
    // Before: checking if peer is set
    if (component.getPeer() != null) { ... }
    // After:
    if (component.isDisplayable()) { ... }

    // Before: checking if component is lightweight
    if (component.getPeer() instanceof LightweightPeer) { ... }
    // After:
    if (component.isLightweight()) { ... }
    ```
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/migrating-jdk-8-later-jdk-releases.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.awt.Component.getPeer
        location: METHOD_CALL
