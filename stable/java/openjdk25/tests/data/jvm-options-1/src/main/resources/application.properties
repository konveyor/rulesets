# Rule: openjdk21-to-openjdk25+-00110
jvm.args=-Xnoagent -Djava.compiler=NONE

# Rule: openjdk21-to-openjdk25+-00130
debug.jvm.args=-Xdebug -agentlib:jdwp=transport=dt_socket,server=y

# Rule: openjdk21-to-openjdk25+-00340
jit.options=-XX:+UnlockExperimentalVMOptions -XX:+UseJVMCICompiler

# Rule: openjdk21-to-openjdk25+-00530
class.pointer.options=-XX:+UseCompressedClassPointers

# Rule: openjdk21-to-openjdk25+-00590
finalizer.options=-XX:+RegisterFinalizersAtInit

# Rule: openjdk21-to-openjdk25+-00600
verify.options=-Xfuture

# Rule: openjdk21-to-openjdk25+-00610
locking.options=-XX:LockingMode=1

# Rule: openjdk21-to-openjdk25+-00620
classgc.options=-noclassgc
