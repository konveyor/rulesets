- ruleID: openjdk25--to-openjdk25+-00970
  description: com.apple.eawt is encapsulated from JDK 9; use java.awt.Desktop instead
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The macOS-specific `com.apple.eawt` package is encapsulated starting in JDK 9 and cannot be compiled against. Use the platform-independent `java.awt.Desktop` class instead, which provides equivalent functionality (JEP 272).
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/migrating-jdk-8-later-jdk-releases.html#GUID-D867DCCC-CEB5-4AFA-9D11-9C62B7A3FAB1
      title: Migration Documentation
  when:
    java.referenced:
        pattern: com.apple.eawt
        location: PACKAGE
