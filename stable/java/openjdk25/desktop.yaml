- ruleID: openjdk25--to-openjdk25+-01010
  description: AppleScript engine removed from JDK with no replacement
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The AppleScript engine, a platform-specific `javax.script` implementation, has been removed from the JDK with no replacement. Code that uses `ScriptEngineManager` to obtain an AppleScript engine will no longer work.
  links:
