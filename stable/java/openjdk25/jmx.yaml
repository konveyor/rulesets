- ruleID: openjdk25--to-openjdk25+-00320
  description: RMIConnectorServer.CREDENTIAL_TYPES removed in Java SE 15
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `RMIConnectorServer.CREDENTIAL_TYPES` field has been removed in Java SE 15. If your code references this field for JMX connector credential type configuration, you need to use an alternative approach for configuring JMX authentication.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/removed-apis.html
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: CREDENTIAL_TYPES
        filePattern: .*\.java
- ruleID: openjdk25--to-openjdk25+-01320
  description: _RMIConnection_Stub IIOP class removed with CORBA in JDK 9+
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `org.omg.stub.javax.management.rmi._RMIConnection_Stub` class has been removed. IIOP transport support was removed from the JMX RMI Connector starting in JDK 9 and the CORBA module was fully removed in JDK 11. Use standard RMI-based (JRMP) JMX connections instead of IIOP.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/removed-tools-and-components.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.omg.stub.javax.management.rmi._RMIConnection_Stub
        location: IMPORT
