- ruleID: openjdk25--to-openjdk25+-00140
  description: MLet class removed in Java SE 23
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `javax.management.loading.MLet` class has been removed in Java SE 23, along with `MLetContent`, `MLetMBean`, and `PrivateMLet`. The MLet (Management appLET) mechanism for loading MBeans from remote URLs is no longer available. Use standard class loading and MBean registration instead.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/removed-apis.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.management.loading.MLet
        location: IMPORT
