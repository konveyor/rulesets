- ruleID: openjdk25--to-openjdk25+-00310
  description: ToolProvider no-arg constructor removed in Java SE 16
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The no-argument constructor `javax.tools.ToolProvider()` has been removed in Java SE 16. Use the static methods `ToolProvider.getSystemJavaCompiler()` or `ToolProvider.getSystemDocumentationTool()` instead of instantiating `ToolProvider` directly.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/removed-apis.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.tools.ToolProvider
        location: CONSTRUCTOR_CALL
- ruleID: openjdk25--to-openjdk25+-01290
  description: jdk.snmp module (SNMP agent) removed in JDK 11
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `jdk.snmp` module has been removed in JDK 11. The SNMP agent and `JVM-MANAGEMENT-MIB.mib` specification for JVM monitoring through SNMP are no longer available. Migrate to alternative monitoring approaches such as JMX, JFR (Java Flight Recorder), or third-party monitoring tools (Prometheus JMX exporter, Micrometer, etc.).
  links:
    - url: https://bugs.openjdk.java.net/browse/JDK-8071367
      title: Migration Documentation
  when:
    java.referenced:
        pattern: sun.management.snmp*
        location: PACKAGE
- ruleID: openjdk25--to-openjdk25+-01300
  description: jdk.snmp module removed in JDK 11
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `jdk.snmp` module has been removed in JDK 11. Remove `requires jdk.snmp;` from your `module-info.java`. The SNMP agent for JVM monitoring is no longer available. Migrate to JMX, JFR, or third-party monitoring solutions.
  links:
    - url: https://bugs.openjdk.java.net/browse/JDK-8071367
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: jdk\.snmp
        filePattern: .*module-info\.java
- ruleID: openjdk25--to-openjdk25+-01310
  description: SNMP management classes removed with jdk.snmp module in JDK 11
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `com.sun.management.snmp` package has been removed in JDK 11 along with the `jdk.snmp` module. The SNMP agent and JVM monitoring through SNMP are no longer available. Migrate to JMX, JFR, or third-party monitoring solutions (Prometheus JMX exporter, Micrometer).
  links:
    - url: https://bugs.openjdk.java.net/browse/JDK-8071367
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: com\.sun\.management\.snmp
        filePattern: .*\.java
