- ruleID: openjdk25--to-openjdk25+-00550
  description: LogManager.addPropertyChangeListener() removed in JDK 9
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `LogManager.addPropertyChangeListener()` method has been removed in JDK 9. Use `LogManager.updateConfiguration()` or override `LogManager.readConfiguration()` to react to logging configuration changes.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/removed-apis.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.util.logging.LogManager.addPropertyChangeListener
        location: METHOD_CALL
