- ruleID: openjdk25--to-openjdk25+-00850
  description: TraceClassLoading flag obsoleted in JDK 16
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `-XX:+TraceClassLoading` flag is obsolete in JDK 16 and has been replaced by Unified Logging. Replace with:

    ```
    -Xlog:class+load=info
    ```
  links:
    - url: https://bugs.java.com/bugdatabase/view_bug.do?bug_id=JDK-8256718
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: TraceClassLoading
        filePattern: .*\.(sh|bat|cmd|properties|ya?ml|xml|gradle)
