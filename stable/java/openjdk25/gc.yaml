- ruleID: openjdk25--to-openjdk25+-01050
  description: The -XX:+UseParNewGC option has no effect from JDK 9
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `-XX:+UseParNewGC` flag has no effect starting in JDK 9 and is deprecated for removal. ParNew can only be used with CMS, which itself was removed in JDK 14. Remove this flag from your JVM arguments.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/migrating-jdk-8-later-jdk-releases.html#GUID-1F270BDA-50B0-49C8-807E-0B727CCC5169
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: UseParNewGC
        filePattern: .*\.(sh|bat|cmd|properties|xml|ya?ml|env|conf|args)
