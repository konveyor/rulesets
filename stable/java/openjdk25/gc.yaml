- ruleID: openjdk25--to-openjdk25+-01030
  description: CMS garbage collector removed in JDK 14 (JEP 363)
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The Concurrent Mark Sweep (CMS) garbage collector was removed in JDK 14 (JEP 363). Remove `-XX:+UseConcMarkSweepGC` and related CMS options from your JVM arguments. Consider using G1 GC (the default) or ZGC.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/migrating-jdk-8-later-jdk-releases.html#GUID-1F270BDA-50B0-49C8-807E-0B727CCC5169
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: UseConcMarkSweepGC
        filePattern: .*\.(sh|bat|cmd|properties|xml|ya?ml|env|conf|args)
- ruleID: openjdk25--to-openjdk25+-01040
