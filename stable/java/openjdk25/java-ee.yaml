- ruleID: openjdk25--to-openjdk25+-00840
  description: javax.annotation web services subset removed in JDK 11 (JEP 320)
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The subset of JSR-250 Common Annotations defined by Java SE to support web services (from the `java.xml.ws.annotation` module) has been removed in JDK 11 (JEP 320). If you use annotations like `@PostConstruct`, `@PreDestroy`, or `@Resource`, add the Jakarta Annotations API as a dependency:

    ```xml
    <dependency>
        <groupId>jakarta.annotation</groupId>
        <artifactId>jakarta.annotation-api</artifactId>
        <version>3.0.0</version>
    </dependency>
    ```
  links:
    - url: http://openjdk.java.net/jeps/320
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.annotation*
        location: PACKAGE
