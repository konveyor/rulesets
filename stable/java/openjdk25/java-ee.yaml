- ruleID: openjdk25--to-openjdk25+-00790
  description: JAX-WS (javax.xml.ws) module removed in JDK 11 (JEP 320)
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `javax.xml.ws` package (Java API for XML Web Services / JAX-WS) has been removed in JDK 11 (JEP 320). Add the JAX-WS RI as an explicit Maven dependency:

    ```xml
    <dependency>
        <groupId>com.sun.xml.ws</groupId>
        <artifactId>jaxws-ri</artifactId>
        <version>4.0.2</version>
        <type>pom</type>
    </dependency>
    ```

    Alternatively, consider migrating to Jakarta XML Web Services (`jakarta.xml.ws`).
  links:
    - url: http://openjdk.java.net/jeps/320
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.xml.ws*
        location: PACKAGE
- ruleID: openjdk25--to-openjdk25+-00800
  description: JAXB (javax.xml.bind) module removed in JDK 11 (JEP 320)
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `javax.xml.bind` package (Java Architecture for XML Binding / JAXB) has been removed in JDK 11 (JEP 320). Add the JAXB RI as an explicit Maven dependency:

    ```xml
    <dependency>
        <groupId>jakarta.xml.bind</groupId>
        <artifactId>jakarta.xml.bind-api</artifactId>
        <version>4.0.2</version>
    </dependency>
    <dependency>
        <groupId>org.glassfish.jaxb</groupId>
        <artifactId>jaxb-runtime</artifactId>
        <version>4.0.5</version>
    </dependency>
    ```

    Consider migrating to Jakarta XML Binding (`jakarta.xml.bind`).
  links:
    - url: http://openjdk.java.net/jeps/320
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.xml.bind*
        location: PACKAGE
