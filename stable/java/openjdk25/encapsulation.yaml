- ruleID: openjdk25--to-openjdk25+-00910
  description: The --illegal-access option has no effect in JDK 17+
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `--illegal-access` launcher option was removed in JDK 17. Any use of this option (with `permit`, `warn`, `debug`, or `deny`) will have no effect other than issuing a warning message. Remove this option from your launch scripts. If you need access to JDK internals, use `--add-exports` or `--add-opens` instead.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/migrating-jdk-8-later-jdk-releases.html#GUID-7BB28E4D-99B3-4078-BDC4-FC24180CE82B
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: \-\-illegal-access
        filePattern: .*\.(sh|bat|cmd|properties|xml|ya?ml|env|conf)
