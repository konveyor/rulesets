- ruleID: openjdk25--to-openjdk25+-00710
  description: Locale class constructors deprecated in JDK 19
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `java.util.Locale` constructors (e.g., `new Locale(String)`, `new Locale(String, String)`, `new Locale(String, String, String)`) are deprecated in JDK 19. Use `Locale.of()` factory methods instead.

    ```java
    // Before
    Locale locale = new Locale("en", "US");

    // After
    Locale locale = Locale.of("en", "US");
    ```
  links:
    - url: https://www.oracle.com/java/technologies/javase/19-relnote-issues.html#JDK-8282819
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.util.Locale
        location: CONSTRUCTOR_CALL
- ruleID: openjdk25--to-openjdk25+-00880
  description: Default charset is now UTF-8 from JDK 18; may affect charset-sensitive code
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: Starting in JDK 18, UTF-8 is the default charset on all platforms (JEP 400). Previously, the default charset depended on the OS and locale (e.g., `windows-1252` on Windows). Code that relies on `Charset.defaultCharset()` may behave differently. To investigate, run with `-Dfile.encoding=UTF-8` on your current JDK, or use `-Dfile.encoding=COMPAT` on JDK 18+ to restore previous behavior.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/migrating-jdk-8-later-jdk-releases.html#GUID-A20F2989-BFA9-482D-8618-6CBB4BAAE310
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.nio.charset.Charset.defaultCharset
        location: METHOD_CALL
- ruleID: openjdk25--to-openjdk25+-00890
  description: CLDR locale data is default from JDK 9; date formatting results may differ
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: Starting in JDK 9, the JDK uses CLDR locale data by default instead of the legacy JDK locale data. This means `SimpleDateFormat` and other locale-sensitive APIs may produce different output. For example, `DateFormat.getDateInstance(DateFormat.MEDIUM, Locale.UK)` prints "19-Mar-2024" on JDK 8 but "19 Mar 2024" on JDK 9+. In JDK 23, legacy locale data was removed entirely. Consider specifying explicit format patterns instead of relying on locale defaults.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/migrating-jdk-8-later-jdk-releases.html#GUID-A20F2989-BFA9-482D-8618-6CBB4BAAE310
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.text.SimpleDateFormat
        location: IMPORT
- ruleID: openjdk25--to-openjdk25+-00900
  description: CLDR locale data is default from JDK 9; date formatting results may differ
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: Starting in JDK 9, the JDK uses CLDR locale data by default. `DateFormat` instances may produce different output than on JDK 8. In JDK 23, legacy locale data (`JRE`/`COMPAT` provider) was removed entirely. Consider specifying explicit format patterns or migrating to `java.time` APIs.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/migrating-jdk-8-later-jdk-releases.html#GUID-A20F2989-BFA9-482D-8618-6CBB4BAAE310
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.text.DateFormat
        location: IMPORT
