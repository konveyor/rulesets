- ruleID: locale-removal-00010
  description: Legacy locale data (JRE/COMPAT) removed in JDK 23
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: Legacy Locale Data using `JRE` or `COMPAT` locale data providers has been removed in JDK 23. Migrate to CLDR locale data by removing `java.locale.providers=COMPAT` or `java.locale.providers=JRE` from your configuration. CLDR locale data is now the only supported provider.
  links:
    - url: https://www.oracle.com/java/technologies/javase/23-relnote-issues.html
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: java\.locale\.providers.*COMPAT|java\.locale\.providers.*JRE
        filePattern: .*\.(properties|ya?ml|xml|conf|sh|bash|bat|cmd)
- ruleID: locale-deprecation-00020
  description: java.locale.useOldISOCodes system property deprecated in JDK 25
  category: optional
  effort: 1
  labels:
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `java.locale.useOldISOCodes` system property is deprecated in JDK 25. Remove usage of this property. Applications should migrate to use current ISO country codes instead of legacy codes.
  links:
    - url: https://www.oracle.com/java/technologies/javase/25-relnote-issues.html
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: java\.locale\.useOldISOCodes
        filePattern: .*\.(properties|ya?ml|sh|bat|cmd|conf|env|args)
- ruleID: locale-removal-00030
  description: JDK 24 removed JDK 1.1 compatible behavior for EST, MST, and HST time zones. These now follow IANA time zone database conventions.
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: 'EST/MST/HST legacy timezone behavior removed in JDK 24: JDK 24 removed JDK 1.1 compatible behavior for EST, MST, and HST time zones. These now follow IANA time zone database conventions.'
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/significant-changes-jdk-24.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.util.TimeZone.getTimeZone
        location: METHOD_CALL
