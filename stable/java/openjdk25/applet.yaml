- ruleID: openjdk25--to-openjdk25+-00770
  description: Applet API deprecated for removal in JDK 17 (JEP 398)
  category: mandatory
  effort: 9
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The Applet API (`java.applet` package) is deprecated for removal in JDK 17 (JEP 398). All web browsers have removed support for Java browser plug-ins. Migrate applet-based functionality to a modern web framework or standalone Java application.
  links:
    - url: https://openjdk.java.net/jeps/398
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.applet*
        location: PACKAGE
