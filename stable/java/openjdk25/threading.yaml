  message: The `Thread.resume()` method has been removed in JDK 23 and now throws `UnsupportedOperationException`. Refactor code to use safer thread coordination mechanisms such as `java.util.concurrent.locks.LockSupport.unpark()` or explicit synchronization with `wait()`/`notify()`.
