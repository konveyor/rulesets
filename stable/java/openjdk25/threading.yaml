- ruleID: openjdk25--to-openjdk25+-00180
  description: Thread.resume() removed in Java SE 23
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `Thread.resume()` method has been removed in Java SE 23. Thread suspension/resumption via `suspend()`/`resume()` was inherently deadlock-prone. Use `java.util.concurrent` locks, conditions, or other synchronization mechanisms instead.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/removed-apis.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.lang.Thread.resume
        location: METHOD_CALL
