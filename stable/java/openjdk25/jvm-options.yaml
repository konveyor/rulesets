  category: optional
  effort: 1
  labels:
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `-verify` and `-verifyremote` JVM options have been deprecated for removal in JDK 24. Replace `-verify` or `-verifyremote` with `-Xverify` (which takes values `all`, `remote`, or `none`).
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/significant-changes-jdk-24.html
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: (^|\s)(-verify|-verifyremote)\b
        filePattern: .*\.(sh|bat|cmd|conf|properties|ya?ml|xml|env|args|Dockerfile)
