- ruleID: jvm-options-deprecation-00010
  description: -Xnoagent JVM option deprecated in JDK 22
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `-Xnoagent` JVM option is deprecated in JDK 22 and removed in JDK 23. Remove this option from your JVM launch arguments, build scripts, and configuration files.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/significant-changes-jdk-22.html
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: -Xnoagent
        filePattern: .*\.(sh|bat|cmd|yml|yaml|xml|gradle|properties|Dockerfile)
- ruleID: jvm-options-deprecation-00020
  description: -Xdebug JVM option deprecated in JDK 22
  category: optional
  effort: 1
  labels:
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `-Xdebug` JVM option is deprecated in JDK 22. This option has been a no-op for several releases. Remove it from your JVM launch arguments and build scripts. Use `-agentlib:jdwp` for debugging instead.
