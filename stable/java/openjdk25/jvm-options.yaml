        filePattern: .*\.(sh|bat|cmd|conf|properties|ya?ml|xml|env|args|Dockerfile)
- ruleID: jvm-options-removal-00060
  description: -Xfuture JVM option removed in JDK 24
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `-Xfuture` JVM option has been removed in JDK 24. This option previously enabled strict class-file format checks. Remove `-Xfuture` from your JVM launch arguments, build scripts, and configuration files. Use `-Xverify` or specific verification options if strict verification is needed.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/significant-changes-jdk-24.html
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: -Xfuture
        filePattern: .*\.(sh|bat|cmd|conf|properties|ya?ml|xml|env|args|Dockerfile)
- ruleID: jvm-options-removal-00070
  description: LockingMode JVM flag deprecated for removal in JDK 24
  category: optional
  effort: 3
  labels:
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `-XX:LockingMode` flag and `LM_LEGACY`/`LM_MONITOR` modes have been deprecated for removal in JDK 24. Remove `-XX:LockingMode=1` (LM_LEGACY) or `-XX:LockingMode=2` (LM_MONITOR) from your JVM arguments. The JVM now uses a single optimized locking implementation.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/significant-changes-jdk-24.html
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: LockingMode
        filePattern: .*\.(sh|bat|cmd|conf|properties|ya?ml|xml|env|args|Dockerfile)
- ruleID: jvm-options-removal-00080
  description: -noclassgc JVM option deprecated for removal in JDK 24
  category: optional
  effort: 1
  labels:
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `-noclassgc` JVM option has been deprecated for removal in JDK 24. Replace it with `-XX:+ClassUnloading` (to enable class GC) or `-XX:-ClassUnloading` (to disable class GC).
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/significant-changes-jdk-24.html
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: -noclassgc
        filePattern: .*\.(sh|bat|cmd|conf|properties|ya?ml|xml|env|args|Dockerfile)
- ruleID: jvm-options-removal-00090
