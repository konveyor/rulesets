        filePattern: .*\.(sh|bat|cmd|yml|yaml|xml|gradle|properties|Dockerfile)
- ruleID: jvm-options-removal-00030
  description: Experimental Graal JIT removed in JDK 25; remove -XX:+UseJVMCICompiler or -XX:+UseGraalJIT flag
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The experimental Graal JIT compiler has been removed in JDK 25. Applications using `-XX:+UseJVMCICompiler` or `-XX:+UseGraalJIT` must remove this flag. The JVM will fail to start if either flag is present.

    Remove `-XX:+UseJVMCICompiler` (or `-XX:+UseGraalJIT`) and `-XX:+UnlockExperimentalVMOptions` (if only used for Graal JIT) from your JVM startup arguments.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/significant-changes-jdk-25.html
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: UseJVMCICompiler|UseGraalJIT
        filePattern: .*\.(sh|bat|cmd|conf|properties|ya?ml|xml|env|args)
- ruleID: jvm-options-deprecation-00040
  description: UseCompressedClassPointers option deprecated in JDK 25
  category: optional
  effort: 1
  labels:
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `-XX:+UseCompressedClassPointers` / `-XX:-UseCompressedClassPointers` JVM option is deprecated in JDK 25. With Compact Object Headers (JEP 519) now a product feature, compressed class pointers handling is managed automatically. Remove this flag from JVM arguments.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/significant-changes-jdk-25.html
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: UseCompressedClassPointers
        filePattern: .*\.(sh|bat|cmd|conf|properties|ya?ml|xml|env|args)
