- ruleID: runtime-removal-00040
  description: sun.rt._sync* performance counters removed in JDK 25
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `sun.rt._sync*` performance counters (e.g., `sun.rt._sync_Inflations`, `sun.rt._sync_Deflations`, `sun.rt._sync_ContendedLockAttempts`, etc.) have been removed in JDK 25 along with PerfData Sampling. Code or monitoring tools that read these counters via `jstat`, `sun.misc.Perf`, or the `sun.management` APIs will no longer find them. Migrate to JFR (Java Flight Recorder) events for synchronization monitoring.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/significant-changes-jdk-25.html
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: sun\.rt\._sync
        filePattern: .*\.(java|properties|xml|ya?ml|sh|bat|cmd|conf)
