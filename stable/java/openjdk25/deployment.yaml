- ruleID: openjdk25--to-openjdk25+-01020
  description: Launch-time JRE version selection removed in JDK 9
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: Launch-time JRE version selection was removed in JDK 9. The `JRE-Version` manifest entry in JAR files is now ignored (with a warning). Remove this entry from your MANIFEST.MF files.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/migrating-jdk-8-later-jdk-releases.html#GUID-954372A5-5954-4075-A1AF-6A9168371246
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: JRE-Version
        filePattern: .*MANIFEST\.MF
- ruleID: openjdk25--to-openjdk25+-01100
  description: Java applets are removed; Applet API deprecated for removal
  category: mandatory
  effort: 9
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: Java applets and the Java Plugin have been removed. The `java.applet.Applet` class and related APIs are deprecated for removal. There is no direct replacement within the JDK. Consider migrating to Java Web Start alternatives, desktop applications using JavaFX/Swing, or web applications.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/migrating-jdk-8-later-jdk-releases.html#GUID-430961F0-C3DF-4F31-BC02-1FE5414B1062
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.applet.Applet
        location: INHERITANCE
