- ruleID: security-removal-00060
  description: System.setSecurityManager() throws UnsupportedOperationException in JDK 24
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The Security Manager has been permanently disabled in JDK 24. `System.setSecurityManager()` now throws `UnsupportedOperationException`. Remove this call and any Security Manager configuration. Applications relying on Security Manager for sandboxing must migrate to alternative security mechanisms.

    See [JEP 486: Permanently Disable the Security Manager](https://openjdk.org/jeps/486).
  links:
    - url: https://openjdk.org/jeps/486
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.lang.System.setSecurityManager
        location: METHOD_CALL
