- ruleID: security-removal-00010
  description: jdk.crypto.ec module deprecated for removal in JDK 22
  category: optional
  effort: 3
  labels:
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `jdk.crypto.ec` module is deprecated for removal in JDK 22. The elliptic curve cryptography functionality has been migrated to the `java.base` module. Remove the `requires jdk.crypto.ec` directive from your `module-info.java` file.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/significant-changes-jdk-22.html
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: requires\s+jdk\.crypto\.ec
        filePattern: module-info\.java
- ruleID: security-removal-00020
  description: SecurityManager permanently disabled in JDK 24
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The Security Manager has been permanently disabled in JDK 24 (JEP 486). The Security Manager API will be removed in a future release. Code using `SecurityManager` should be migrated to alternative security mechanisms. Applications that call `System.setSecurityManager()` will receive an `UnsupportedOperationException`.

    See [JEP 486: Permanently Disable the Security Manager](https://openjdk.org/jeps/486).
  links:
    - url: https://openjdk.org/jeps/486
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.lang.SecurityManager
        location: IMPORT
- ruleID: security-removal-00030
  description: AccessController permanently disabled with Security Manager in JDK 24
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The Security Manager has been permanently disabled in JDK 24 (JEP 486). `AccessController` and its `doPrivileged()` method are no longer functional. Remove `AccessController.doPrivileged()` calls and run the code directly, or use alternative security mechanisms.

    See [JEP 486: Permanently Disable the Security Manager](https://openjdk.org/jeps/486).
  links:
    - url: https://openjdk.org/jeps/486
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.security.AccessController
        location: IMPORT
