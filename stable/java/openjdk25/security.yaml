- ruleID: openjdk25--to-openjdk25+-00010
  description: Security Manager is permanently disabled in JDK 24 (JEP 486)
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The Security Manager has been permanently disabled in JDK 24 via JEP 486. Any code that relies on `java.lang.SecurityManager` will no longer function. There is no replacement for the Security Manager. You must remove all Security Manager usage and find alternative approaches for security controls. See JEP 486 for discussion and alternatives.
  links:
    - url: https://openjdk.org/jeps/486
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.lang.SecurityManager
        location: IMPORT
- ruleID: openjdk25--to-openjdk25+-00070
  description: java.security.manager system property default changed to disallow in JDK 18
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: Starting in JDK 18, the `java.security.manager` system property default value changed to `disallow`. Code that calls `System.setSecurityManager()` will throw an `UnsupportedOperationException` unless the application is launched with `-Djava.security.manager=allow`. Note that the Security Manager is deprecated for removal in later JDK versions — consider removing SecurityManager usage entirely.
  links:
    - url: https://www.oracle.com/java/technologies/javase/18-relnote-issues.html#JDK-8270380
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.lang.System.setSecurityManager
        location: METHOD_CALL
- ruleID: openjdk25--to-openjdk25+-00080
  description: Duplicated RSA services removed from SunJSSE provider in JDK 13
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In JDK 13, duplicated RSA services (KeyFactory, KeyPairGenerator, and Signature) were removed from the SunJSSE provider. If your code explicitly requests RSA operations from the `SunJSSE` provider (e.g., `KeyFactory.getInstance("RSA", "SunJSSE")`), switch to using the default provider or explicitly use `SunRsaSign` instead.

    Before:
    ```java
    KeyFactory.getInstance("RSA", "SunJSSE");
    ```

    After:
    ```java
    KeyFactory.getInstance("RSA"); // uses default SunRsaSign provider
    ```
  links:
    - url: https://www.oracle.com/java/technologies/javase/13-relnote-issues.html#JDK-8220016
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: '"SunJSSE"'
        filePattern: .*\.java
- ruleID: openjdk25--to-openjdk25+-00090
  description: Default keystore type changed from JKS to PKCS12 in JDK 9
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Starting in JDK 9, the default keystore type changed from JKS to PKCS12. Code that calls `KeyStore.getDefaultType()` will now receive `pkcs12` instead of `jks`. If your application creates new keystores using the default type and then shares them with older systems expecting JKS format, you may need to explicitly specify `KeyStore.getInstance("JKS")`. Oracle recommends migrating existing JKS keystores to PKCS12 format using:
    ```bash
    keytool -importkeystore -srckeystore keystore.jks -destkeystore keystore.p12 -deststoretype pkcs12
    ```
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/security-updates.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.security.KeyStore.getDefaultType
        location: METHOD_CALL
