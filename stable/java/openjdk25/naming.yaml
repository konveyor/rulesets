- ruleID: openjdk25--to-openjdk25+-00130
  description: javax.naming.Context.APPLET field removed in Java SE 24
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `javax.naming.Context.APPLET` constant field has been removed in Java SE 24. Applet-based JNDI context initialization is no longer supported. Use alternative JNDI environment configuration methods.
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/removed-tools-and-components.html
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: Context\.APPLET
        filePattern: .*\.java
