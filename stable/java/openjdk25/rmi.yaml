  message: The entire `java.rmi.activation` package has been removed in Java SE 17. This includes `Activatable`, `ActivationDesc`, `ActivationGroup`, `ActivationGroupDesc`, `ActivationGroupID`, `ActivationID`, `ActivationInstantiator`, `ActivationMonitor`, `ActivationSystem`, `Activator`, and `ActivationGroup_Stub`. RMI Activation was a mechanism for starting remote objects on demand. Migrate to alternative remote service frameworks or restructure to avoid on-demand activation.
