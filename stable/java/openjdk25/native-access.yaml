- ruleID: openjdk25--to-openjdk25+-00030
  description: JNI native library loading now requires --enable-native-access (JEP 472)
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: Starting in JDK 24, calling `System.loadLibrary()` is a restricted operation under JEP 472. Without `--enable-native-access=ALL-UNNAMED` (or specifying the module), a warning is issued at runtime. In a future JDK release, this will throw `IllegalCallerException` by default. Add `--enable-native-access` to your application launch configuration.
  links:
    - url: https://openjdk.org/jeps/472
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.lang.System.loadLibrary
        location: METHOD_CALL
