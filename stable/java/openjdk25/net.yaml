- ruleID: openjdk25--to-openjdk25+-00700
  description: java.net.URL constructors deprecated in JDK 20
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `java.net.URL` constructors are deprecated in JDK 20. Use `URI.create(String).toURL()` or `URI.toURL()` instead of `new URL(String)`. The `URL` class constructors do not validate the URL format; `URI` provides proper validation.

    ```java
    // Before
    URL url = new URL("https://example.com");

    // After
    URL url = URI.create("https://example.com").toURL();
    ```
  links:
    - url: https://www.oracle.com/java/technologies/javase/20-relnote-issues.html#JDK-8294241
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.net.URL
        location: CONSTRUCTOR_CALL
