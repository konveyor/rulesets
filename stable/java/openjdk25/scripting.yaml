- ruleID: openjdk25--to-openjdk25+-00650
  description: jdk.jsobject module deprecated for removal in JDK 24
  category: potential
  effort: 7
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `jdk.jsobject` module, which provides the `netscape.javascript` package (including `JSObject` and `JSException`), is deprecated for removal. If your code uses `netscape.javascript.JSObject` for Java-JavaScript interop, migrate to an alternative approach.
  links:
    - url: https://www.oracle.com/java/technologies/javase/24-relnote-issues.html#JDK-8311530
      title: Migration Documentation
  when:
    java.referenced:
        pattern: netscape.javascript*
        location: PACKAGE
- ruleID: openjdk25--to-openjdk25+-00780
  description: Nashorn JavaScript engine removed in JDK 15 (JEP 372)
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The Nashorn JavaScript engine and its APIs have been removed in JDK 15 (JEP 372). If your code uses `ScriptEngineManager` with the Nashorn engine or imports from `jdk.nashorn.api.scripting`, migrate to GraalVM JavaScript (`org.graalvm.js:js` and `org.graalvm.js:js-scriptengine`) or another JavaScript engine.
  links:
    - url: https://openjdk.java.net/jeps/372
      title: Migration Documentation
  when:
    java.referenced:
        pattern: jdk.nashorn*
        location: PACKAGE
