- ruleID: openjdk25--to-openjdk25+-00590
  description: sun.reflect.Reflection is unsupported and may be removed
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `sun.reflect.Reflection.getCallerClass(int)` method is from an unsupported, JDK-internal API that may be removed. Use the Stack-Walking API (JEP 259) instead.

    ```java
    // Before
    import sun.reflect.Reflection;
    Class<?> caller = Reflection.getCallerClass(2);

    // After
    import java.lang.StackWalker;
    Class<?> caller = StackWalker.getInstance(StackWalker.Option.RETAIN_CLASS_REFERENCE)
        .getCallerClass();
    ```
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/migrating-jdk-8-later-jdk-releases.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: sun.reflect.Reflection
        location: IMPORT
- ruleID: openjdk25--to-openjdk25+-00740
  description: finalize() deprecated for removal in JDK 18 (JEP 421)
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `finalize()` method has been deprecated for removal in JDK 18 (JEP 421). Finalization is unreliable, slow, and dangerous. Migrate to `java.lang.ref.Cleaner` (JDK 9+) or `try-with-resources` for resource cleanup.

    ```java
    // Before
    @Override
    protected void finalize() throws Throwable {
        closeResource();
    }

    // After — use Cleaner
    private static final Cleaner cleaner = Cleaner.create();
    // register cleanup action in constructor
    cleaner.register(this, resource::close);
    ```
  links:
    - url: https://openjdk.java.net/jeps/421
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: finalize\(\)
        filePattern: .*\.java
