- ruleID: openjdk25--to-openjdk25+-01110
  description: Negated character class behavior changed in JDK 9 regex engine
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: 'Starting in JDK 9, the `java.util.regex.Pattern` class changed how negated character classes with nesting and intersection are evaluated. In JDK 8, `[^a-b[c-d]e-f]` does not negate nested classes, but in JDK 9+ negation applies to all nested character classes. Also, `[^a-d&&c-f]` is interpreted differently: in JDK 8 negation is applied first, in JDK 9+ intersection (`&&`) is applied first. Review regular expressions that use character classes with negation, intersection, and nesting.'
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/migrating-jdk-8-later-jdk-releases.html#GUID-7DACC239-E71D-4B89-B582-201EA7CEBC38
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.util.regex.Pattern
        location: IMPORT
