- ruleID: openjdk25--to-openjdk25+-00570
  description: sun.misc.BASE64Encoder removed in JDK 9
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `sun.misc.BASE64Encoder` class has been removed in JDK 9. Use `java.util.Base64.getEncoder()` instead.

    ```java
    // Before
    import sun.misc.BASE64Encoder;
    BASE64Encoder encoder = new BASE64Encoder();
    String encoded = encoder.encode(data);

    // After
    import java.util.Base64;
    String encoded = Base64.getEncoder().encodeToString(data);
    ```
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/migrating-jdk-8-later-jdk-releases.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: sun.misc.BASE64Encoder
        location: IMPORT
- ruleID: openjdk25--to-openjdk25+-00580
  description: sun.misc.BASE64Decoder removed in JDK 9
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
