- ruleID: openjdk25--to-openjdk25+-00020
  description: sun.misc.Unsafe memory-access methods deprecated for removal (JEP 471)
  category: potential
  effort: 7
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: 'The memory-access methods in `sun.misc.Unsafe` have been deprecated for removal in JDK 23 (JEP 471). In JDK 24, invoking these methods causes a runtime warning (JEP 498). Migrate to the standard APIs: the VarHandle API (JEP 193, since JDK 9) or the Foreign Function & Memory API (JEP 454, since JDK 22).'
  links:
    - url: https://openjdk.org/jeps/471
      title: Migration Documentation
  when:
    java.referenced:
        pattern: sun.misc.Unsafe
        location: IMPORT
