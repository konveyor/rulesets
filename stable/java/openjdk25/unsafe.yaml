- ruleID: openjdk25--to-openjdk25+-00670
  description: Unsafe.shouldBeInitialized() removed in JDK 22
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=openjdk25-
    - konveyor.io/source=openjdk
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: The `sun.misc.Unsafe.shouldBeInitialized(Class)` method has been removed in JDK 22. Use the standard `java.lang.invoke.MethodHandles.Lookup.ensureInitialized(Class)` method (available since JDK 15) as a replacement.
  links:
    - url: https://www.oracle.com/java/technologies/javase/22-relnote-issues.html#JDK-8316160
      title: Migration Documentation
  when:
    java.referenced:
        pattern: sun.misc.Unsafe.shouldBeInitialized
        location: METHOD_CALL
