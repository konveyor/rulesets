- ruleID: unsafe-removal-00010
  description: sun.misc.Unsafe.shouldBeInitialized removed in JDK 22
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/target=openjdk25+
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `sun.misc.Unsafe.shouldBeInitialized(Class)` method has been removed in JDK 22. Use `java.lang.invoke.MethodHandles.Lookup::ensureInitialized` as a replacement for class initialization checks.

    ## Before
    ```java
    import sun.misc.Unsafe;
    Unsafe unsafe = ...;
    boolean initialized = unsafe.shouldBeInitialized(MyClass.class);
    ```

    ## After
    ```java
    import java.lang.invoke.MethodHandles;
    MethodHandles.lookup().ensureInitialized(MyClass.class);
    ```
  links:
    - url: https://docs.oracle.com/en/java/javase/25/migrate/significant-changes-jdk-22.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: sun.misc.Unsafe.shouldBeInitialized
        location: METHOD_CALL
